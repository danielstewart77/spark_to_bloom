{% extends "layout.html" %}
{% block content %}
<style>
  #graph-container {
    position: relative;
    width: 100%;
    min-height: 80vh;
    background: #0a0e19;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 1rem;
  }
  #cy {
    width: 100%;
    height: 80vh;
  }
  #sidebar {
    position: absolute;
    top: 0;
    right: 0;
    width: 320px;
    max-width: 90%;
    height: 100%;
    background: rgba(10, 14, 25, 0.90);
    border-left: 1px solid rgba(56, 189, 248, 0.2);
    color: #dce8f0;
    padding: 1.5rem;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    z-index: 10;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 0.85rem;
  }
  #sidebar.open {
    transform: translateX(0);
  }
  #sidebar-close {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    background: none;
    border: 1px solid rgba(56, 189, 248, 0.3);
    color: #38bdf8;
    font-size: 1.2rem;
    cursor: pointer;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
  }
  #sidebar-close:hover {
    background: rgba(56, 189, 248, 0.1);
  }
  #sidebar h3 {
    margin: 0 0 0.5rem 0;
    color: #38bdf8;
    font-size: 1rem;
    word-break: break-word;
  }
  #sidebar .node-type {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
    margin-bottom: 1rem;
    font-weight: bold;
  }
  #sidebar .props {
    background: rgba(22, 32, 48, 0.6);
    padding: 1rem;
    border-radius: 6px;
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.5;
  }
  #graph-status {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #94a3b8;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 0.9rem;
    z-index: 5;
  }
  .legend {
    position: absolute;
    bottom: 1rem;
    left: 1rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    z-index: 5;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 0.7rem;
    color: #94a3b8;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
</style>

<div id="graph-container">
  <div id="graph-status">Loading graph...</div>
  <div id="cy"></div>
  <div id="sidebar">
    <button id="sidebar-close" onclick="closeSidebar()">&times;</button>
    <h3 id="sidebar-name"></h3>
    <span id="sidebar-type" class="node-type"></span>
    <div class="props" id="sidebar-props"></div>
  </div>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:#c9a84c"></span> Agent</span>
    <span class="legend-item"><span class="legend-dot" style="background:#38bdf8"></span> Memory</span>
    <span class="legend-item"><span class="legend-dot" style="background:#4ade80"></span> Person</span>
    <span class="legend-item"><span class="legend-dot" style="background:#a78bfa"></span> Concept</span>
    <span class="legend-item"><span class="legend-dot" style="background:#94a3b8"></span> Other</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.4/cytoscape.min.js"></script>
<script>
(function() {
  var TYPE_COLORS = {
    'Agent':   '#c9a84c',
    'Memory':  '#38bdf8',
    'Person':  '#4ade80',
    'Concept': '#a78bfa'
  };
  var DEFAULT_COLOR = '#94a3b8';

  var statusEl = document.getElementById('graph-status');

  fetch('/graph/data')
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      statusEl.style.display = 'none';

      if (!data.nodes || data.nodes.length === 0) {
        statusEl.textContent = 'No graph data available.';
        statusEl.style.display = 'block';
        return;
      }

      var elements = [];

      data.nodes.forEach(function(n) {
        elements.push({
          data: {
            id: n.id,
            label: n.label,
            type: n.type,
            properties: n.properties || {}
          }
        });
      });

      data.edges.forEach(function(e) {
        elements.push({
          data: {
            source: e.source,
            target: e.target,
            label: e.label
          }
        });
      });

      var cy = cytoscape({
        container: document.getElementById('cy'),
        elements: elements,
        style: [
          {
            selector: 'node',
            style: {
              'label': 'data(label)',
              'text-valign': 'bottom',
              'text-halign': 'center',
              'font-size': '10px',
              'color': '#dce8f0',
              'text-outline-color': '#0a0e19',
              'text-outline-width': 2,
              'background-color': DEFAULT_COLOR,
              'width': 30,
              'height': 30
            }
          },
          {
            selector: 'node[type = "Agent"]',
            style: { 'background-color': TYPE_COLORS['Agent'] }
          },
          {
            selector: 'node[type = "Memory"]',
            style: { 'background-color': TYPE_COLORS['Memory'] }
          },
          {
            selector: 'node[type = "Person"]',
            style: { 'background-color': TYPE_COLORS['Person'] }
          },
          {
            selector: 'node[type = "Concept"]',
            style: { 'background-color': TYPE_COLORS['Concept'] }
          },
          {
            selector: 'edge',
            style: {
              'label': 'data(label)',
              'font-size': '8px',
              'color': '#64748b',
              'text-outline-color': '#0a0e19',
              'text-outline-width': 1,
              'width': 1.5,
              'line-color': 'rgba(56, 189, 248, 0.3)',
              'target-arrow-color': 'rgba(56, 189, 248, 0.4)',
              'target-arrow-shape': 'triangle',
              'curve-style': 'bezier',
              'text-rotation': 'autorotate'
            }
          }
        ],
        layout: {
          name: 'cose',
          animate: true,
          animationDuration: 1000,
          nodeRepulsion: function() { return 8000; },
          idealEdgeLength: function() { return 120; },
          gravity: 0.25,
          padding: 40
        }
      });

      // Click handler: show sidebar with node details
      cy.on('tap', 'node', function(evt) {
        var node = evt.target;
        var d = node.data();
        document.getElementById('sidebar-name').textContent = d.label;
        var typeEl = document.getElementById('sidebar-type');
        typeEl.textContent = d.type;
        typeEl.style.background = TYPE_COLORS[d.type] || DEFAULT_COLOR;
        typeEl.style.color = '#0a0e19';

        var propsText = '';
        if (d.properties && Object.keys(d.properties).length > 0) {
          propsText = JSON.stringify(d.properties, null, 2);
        } else {
          propsText = '(no additional properties)';
        }
        document.getElementById('sidebar-props').textContent = propsText;
        document.getElementById('sidebar').classList.add('open');
      });

      // Click on background closes sidebar
      cy.on('tap', function(evt) {
        if (evt.target === cy) {
          closeSidebar();
        }
      });
    })
    .catch(function(err) {
      statusEl.textContent = 'Error loading graph: ' + err.message;
    });
})();

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}
</script>
{% endblock %}
