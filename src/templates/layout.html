<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark to Bloom</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='style.css') }}?v=7">
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
    <script src="//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/" class="nav-brand glow">spark to bloom</a>
            <button class="nav-toggle" aria-label="Toggle navigation" onclick="toggleNav()">&#9776;</button>
            <ul id="nav-links">
                <li><a href="/">home</a></li>
                <li><a href="/pages/about.md">about</a></li>
                <li><a href="/pullrequests">pull-&gt;requests</a></li>
                <li><a href="/pages/backlog.md">backlog</a></li>
                <li><a href="/canvas">canvas</a></li>
                <li><a href="/linkedin">linkedin</a></li>
            </ul>
        </div>
    </nav>
    <div class="content-wrapper">
        <div class="terminal-box">
            <p>> hey there, i'm daniel. feel free to look at my stuff. reach out, if you want to chat</p>
            <a href="https://www.linkedin.com/in/danielstewart-ai/" target="_blank" rel="noopener" class="linkedin-inline-link" aria-label="Connect on LinkedIn">
                <svg viewBox="0 0 200 38" height="38" xmlns="http://www.w3.org/2000/svg">
                  <!-- Person node -->
                  <circle cx="19" cy="19" r="15" fill="#162030" stroke="#38bdf8" stroke-width="1.3"/>
                  <circle cx="19" cy="14" r="5.5" fill="#38bdf8" opacity="0.9"/>
                  <path d="M9,28 Q9,21 19,21 Q29,21 29,28" fill="#38bdf8" opacity="0.9"/>
                  <!-- Animated dashed line -->
                  <line x1="35" y1="19" x2="148" y2="19" stroke="#38bdf8" stroke-width="1.1" opacity="0.65" class="conn-line"/>
                  <!-- Pulse dots -->
                  <circle cx="75"  cy="19" r="2.2" fill="#38bdf8" opacity="0.5"/>
                  <circle cx="105" cy="19" r="2.2" fill="#38bdf8" opacity="0.5"/>
                  <circle cx="135" cy="19" r="2.2" fill="#38bdf8" opacity="0.5"/>
                  <!-- LinkedIn badge -->
                  <rect x="150" y="4" width="32" height="30" rx="6" fill="#0a66c2"/>
                  <text x="166" y="24" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="17" font-weight="bold">in</text>
                </svg>
            </a>
        </div>
        {% block content %}{% endblock %}
        <footer class="terminal-box"><p></p></footer>
    </div>
    <script src="{{ request.url_for('static', path='scripts.js') }}?v=2"></script>
</body>
</html>
