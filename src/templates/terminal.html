{% extends "layout.html" %}
{% block content %}
<main class="terminal-page">
    <div class="term-shell">
        <div class="term-topbar">
            <select id="mind-select" class="term-mind-select" aria-label="active sessions">
                {% for mind in selector_minds %}
                <optgroup label="{{ mind.name }} · {{ mind.id[:8] }}">
                    <option value="new:{{ mind.id }}"
                            data-action="new"
                            data-mind-id="{{ mind.id }}"
                            data-mind-name="{{ mind.name }}">— new session for {{ mind.name }} —</option>
                    {% for session in mind.sessions %}
                    <option value="session:{{ session.id }}"
                            data-action="load"
                            data-session-id="{{ session.id }}"
                            data-mind-id="{{ mind.id }}"
                            data-mind-name="{{ mind.name }}"
                            data-status="{{ session.status }}"
                            data-last-active="{{ session.last_active }}"
                            data-summary="{{ session.summary }}">{{ mind.name }} · {{ session.short_id }} · {{ session.status }} · {{ session.age }}{% if session.summary %} · {{ session.summary[:48] }}{% endif %}</option>
                    {% endfor %}
                </optgroup>
                {% endfor %}
            </select>
            <span id="term-session-info" class="term-session-info">no session</span>
            <button id="term-new-session" class="term-action-btn" type="button">new session</button>
            <button id="term-speaker-btn" class="term-action-btn" type="button" title="toggle Skippy voice playback" aria-pressed="false">speaker off</button>
            <button id="term-refresh" class="term-action-btn" type="button" title="refresh session list">↻</button>
        </div>
        <div id="term-feed" class="term-feed" aria-live="polite"></div>
        <form id="term-input-form" class="term-input-bar" autocomplete="off">
            <span class="term-prompt">&gt;</span>
            <textarea id="term-input" class="term-input" rows="1" placeholder="type a message…" aria-label="message" autofocus></textarea>
            <button id="term-mic-btn" type="button" class="term-send-btn" title="hold or toggle to dictate" hidden>mic</button>
            <button type="submit" class="term-send-btn">send</button>
        </form>
    </div>
</main>

<script>
(function () {
    const feed = document.getElementById("term-feed");
    const form = document.getElementById("term-input-form");
    const input = document.getElementById("term-input");
    const mindSelect = document.getElementById("mind-select");
    const sessionInfo = document.getElementById("term-session-info");
    const newSessionBtn = document.getElementById("term-new-session");
    const refreshBtn = document.getElementById("term-refresh");

    let currentSessionId = null;
    let currentMindId = null;
    let currentMindName = null;
    let eventSource = null;
    let currentAssistantEl = null;
    let reattachTimer = null;
    let reattachStartedAt = 0;
    let sessionWasClosed = false;
    let inFlight = false;
    let pendingUserText = null;
    let pendingUserEl = null;
    let pendingPill = null;

    function appendLine(cls, text) {
        currentAssistantEl = null;
        const el = document.createElement("div");
        el.className = "term-line " + cls;
        el.textContent = text;
        feed.appendChild(el);
        feed.scrollTop = feed.scrollHeight;
        return el;
    }

    function startAssistantLine(mindName) {
        currentAssistantEl = document.createElement("div");
        currentAssistantEl.className = "term-line term-assistant";
        currentAssistantEl.dataset.prefix = (mindName || "ada") + " > ";
        currentAssistantEl.textContent = currentAssistantEl.dataset.prefix;
        feed.appendChild(currentAssistantEl);
        feed.scrollTop = feed.scrollHeight;
    }

    function appendAssistantChunk(text) {
        if (!currentAssistantEl) return;
        currentAssistantEl.textContent += text;
        feed.scrollTop = feed.scrollHeight;
    }

    function extractText(event) {
        const v = event.content || event.delta || event.text ||
            (event.message && (event.message.content || event.message.text)) || "";
        if (typeof v === "string") return v;
        if (Array.isArray(v)) return v.map(function(i) {
            return typeof i === "string" ? i : (i.text || i.content || "");
        }).join("");
        return v.text || v.content || "";
    }

    function handleEvent(event) {
        if (event.type === "assistant") {
            inFlight = true;
            const chunk = extractText(event);
            if (!chunk) return;
            if (!currentAssistantEl) {
                const mindName = mindSelect.selectedOptions[0] && mindSelect.selectedOptions[0].dataset.mindName;
                startAssistantLine(mindName);
            }
            appendAssistantChunk(chunk);
            ttsAccumulate(chunk);
            scheduleTtsFlush();
        } else if (event.type === "user") {
            const text = extractText(event);
            if (pendingUserEl && text === pendingUserText) {
                // Server confirmed our pending message — undim it
                pendingUserEl.classList.remove("term-pending");
                if (pendingPill) { pendingPill.remove(); pendingPill = null; }
                pendingUserEl = null;
                pendingUserText = null;
                inFlight = false;
            } else if (text) {
                appendLine("term-user", "> " + text);
            }
            flushTtsNow();
        } else if (event.type === "session_closed") {
            currentAssistantEl = null;
            inFlight = false;
            pendingUserEl = null; pendingUserText = null; pendingPill = null;
            sessionWasClosed = true;
            disconnectStream();
            beginReattachLoop();
        }
        // tool events are intentionally ignored
    }

    function disconnectStream() {
        if (eventSource) { eventSource.close(); eventSource = null; }
    }

    function connectStream(sessionId) {
        disconnectStream();
        eventSource = new EventSource("/api/console/" + sessionId + "/stream");
        eventSource.onmessage = function(msg) {
            try { handleEvent(JSON.parse(msg.data)); } catch(e) {}
        };
        eventSource.onerror = function() {
            if (sessionWasClosed) return;
            setTimeout(function() {
                if (currentSessionId === sessionId && !sessionWasClosed) connectStream(sessionId);
            }, 3000);
        };
    }

    function cancelReattachLoop() {
        if (reattachTimer) { clearTimeout(reattachTimer); reattachTimer = null; }
    }

    function beginReattachLoop() {
        cancelReattachLoop();
        if (!currentMindId) {
            appendLine("term-system", "— session closed —");
            return;
        }
        reattachStartedAt = Date.now();
        appendLine("term-system", "session rotated — reattaching to " + (currentMindName || "mind") + "…");
        pollForSuccessor();
    }

    async function pollForSuccessor() {
        if (!currentMindId) return;
        const deadId = currentSessionId || "";
        const mindId = currentMindId;
        try {
            const resp = await fetch(
                "/api/terminal/active?mind_id=" + encodeURIComponent(mindId) +
                "&exclude=" + encodeURIComponent(deadId),
                {credentials: "same-origin"}
            );
            if (resp.status === 200) {
                const successor = await resp.json();
                if (successor && successor.id) {
                    attachSuccessor(successor);
                    return;
                }
            }
        } catch(err) { /* swallow; retry below */ }

        const elapsed = Date.now() - reattachStartedAt;
        if (elapsed >= 30000) {
            try {
                const created = await fetch("/api/terminal/session", {
                    method: "POST",
                    credentials: "same-origin",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({mind_id: mindId}),
                });
                if (created.ok) {
                    const sess = await created.json();
                    attachSuccessor(sess);
                    return;
                }
            } catch(err) { /* fall through */ }
            appendLine("term-system", "reattach failed — pick a session above to retry");
            return;
        }
        reattachTimer = setTimeout(pollForSuccessor, 2000);
    }

    function attachSuccessor(session) {
        cancelReattachLoop();
        sessionWasClosed = false;
        appendLine("term-system", "reattached to " + (session.id || "").slice(0, 8));
        currentSessionId = session.id;
        currentMindId = session.mind_id || currentMindId;
        sessionInfo.textContent = (session.mind_id || "").slice(0, 8) + " · " + (session.status || "running");
        rememberSession(session.id);
        connectStream(session.id);
        refreshSelector(session.id);
    }

    function rememberSession(sessionId) {
        try { if (sessionId) localStorage.setItem("term-session", sessionId); } catch(e) {}
    }
    function recalledSession() {
        try { return localStorage.getItem("term-session") || ""; } catch(e) { return ""; }
    }

    function setSession(session) {
        cancelReattachLoop();
        sessionWasClosed = false;
        currentSessionId = session.id;
        currentMindId = session.mind_id || currentMindId;
        const opt = selectedOption();
        if (opt && opt.dataset.mindName) currentMindName = opt.dataset.mindName;
        sessionInfo.textContent = (session.mind_id || "").slice(0, 8) + " · " + session.status;
        feed.innerHTML = "";
        currentAssistantEl = null;
        inFlight = false;
        pendingUserEl = null; pendingUserText = null; pendingPill = null;
        if (session.summary && session.summary !== "New session") {
            appendLine("term-system", "context: " + session.summary);
        }
        rememberSession(session.id);
        connectStream(session.id);
        input.focus();
    }

    function selectedOption() {
        return mindSelect.selectedOptions[0] || null;
    }

    function selectedMindId() {
        const opt = selectedOption();
        return (opt && opt.dataset.mindId) || "";
    }

    function attachSessionFromOption(opt) {
        const sessionObj = {
            id: opt.dataset.sessionId,
            mind_id: opt.dataset.mindId,
            status: opt.dataset.status || "running",
            summary: opt.dataset.summary || "",
            last_active: opt.dataset.lastActive || "",
        };
        setSession(sessionObj);
    }

    async function createSession(mindId) {
        if (!mindId) { appendLine("term-system", "no mind selected"); return; }
        const resp = await fetch("/api/terminal/session", {
            method: "POST",
            credentials: "same-origin",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({mind_id: mindId}),
        });
        if (!resp.ok) { appendLine("term-system", "error creating session"); return; }
        const session = await resp.json();
        feed.innerHTML = "";
        currentAssistantEl = null;
        setSession(session);
        await refreshSelector(session.id);
    }

    async function refreshSelector(preserveSessionId) {
        try {
            const resp = await fetch("/api/terminal/selector", {credentials: "same-origin"});
            if (!resp.ok) return;
            const data = await resp.json();
            rebuildSelector(data, preserveSessionId || currentSessionId);
        } catch(err) { /* swallow */ }
    }

    function rebuildSelector(minds, preserveSessionId) {
        const previousValue = mindSelect.value;
        mindSelect.innerHTML = "";
        minds.forEach(function(mind) {
            const group = document.createElement("optgroup");
            group.label = mind.name + " · " + (mind.id || "").slice(0, 8);
            const newOpt = document.createElement("option");
            newOpt.value = "new:" + mind.id;
            newOpt.dataset.action = "new";
            newOpt.dataset.mindId = mind.id;
            newOpt.dataset.mindName = mind.name;
            newOpt.textContent = "— new session for " + mind.name + " —";
            group.appendChild(newOpt);
            (mind.sessions || []).forEach(function(s) {
                const opt = document.createElement("option");
                opt.value = "session:" + s.id;
                opt.dataset.action = "load";
                opt.dataset.sessionId = s.id;
                opt.dataset.mindId = mind.id;
                opt.dataset.mindName = mind.name;
                opt.dataset.status = s.status || "";
                opt.dataset.lastActive = s.last_active || "";
                opt.dataset.summary = s.summary || "";
                const summaryPart = s.summary ? " · " + s.summary.slice(0, 48) : "";
                opt.textContent = mind.name + " · " + s.short_id + " · " + s.status + " · " + s.age + summaryPart;
                group.appendChild(opt);
            });
            mindSelect.appendChild(group);
        });
        const targetValue = preserveSessionId
            ? "session:" + preserveSessionId
            : previousValue;
        const found = Array.from(mindSelect.options).find(o => o.value === targetValue);
        if (found) {
            mindSelect.value = targetValue;
        }
    }

    mindSelect.addEventListener("change", function() {
        const opt = selectedOption();
        if (!opt) return;
        if (opt.dataset.action === "new") {
            createSession(opt.dataset.mindId);
        } else if (opt.dataset.action === "load" && opt.dataset.sessionId) {
            attachSessionFromOption(opt);
        }
    });

    newSessionBtn.addEventListener("click", function() {
        createSession(selectedMindId());
    });

    if (refreshBtn) {
        refreshBtn.addEventListener("click", function() { refreshSelector(); });
    }

    function autoGrowInput() {
        input.style.height = "auto";
        input.style.height = input.scrollHeight + "px";
    }
    input.addEventListener("input", autoGrowInput);
    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            form.requestSubmit();
        }
    });
    setTimeout(autoGrowInput, 0);

    async function doInterrupt(pill) {
        pill.disabled = true;
        pill.textContent = "interrupting…";
        try {
            await fetch("/api/console/" + currentSessionId + "/interrupt", {
                method: "POST",
                credentials: "same-origin",
            });
        } catch(e) {
            pill.disabled = false;
            pill.textContent = "interrupt";
        }
        // State clears when the server echoes the user event back
    }

    form.addEventListener("submit", async function(e) {
        e.preventDefault();
        const text = input.value.trim();
        if (!text || !currentSessionId) return;
        input.value = "";
        autoGrowInput();
        currentAssistantEl = null;

        // Show message immediately (dimmed until server echoes it back)
        if (!pendingUserEl) {
            const lineEl = document.createElement("div");
            lineEl.className = "term-line term-user term-pending";
            lineEl.textContent = "> " + text;
            if (inFlight) {
                const pill = document.createElement("button");
                pill.type = "button";
                pill.className = "term-interrupt-pill";
                pill.textContent = "interrupt";
                pill.addEventListener("click", function() { doInterrupt(pill); });
                lineEl.appendChild(pill);
                pendingPill = pill;
            }
            feed.appendChild(lineEl);
            feed.scrollTop = feed.scrollHeight;
            pendingUserEl = lineEl;
            pendingUserText = text;
        }

        try {
            await fetch("/api/console/" + currentSessionId + "/message", {
                method: "POST",
                credentials: "same-origin",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({text: text}),
            });
        } catch(err) {
            appendLine("term-system", "send error: " + err.message);
            if (pendingUserEl) {
                pendingUserEl.remove();
                pendingUserEl = null; pendingUserText = null; pendingPill = null;
            }
        }
    });

    // --- Voice output (Skippy TTS) ---
    const speakerBtn = document.getElementById("term-speaker-btn");
    const audioEl = new Audio();
    audioEl.preload = "auto";
    let speakerOn = false;
    let ttsBuffer = "";
    let ttsFlushTimer = null;
    let ttsPlaying = false;
    const ttsQueue = [];

    function loadSpeakerPref() {
        try { return localStorage.getItem("term-speaker") === "on"; }
        catch(e) { return false; }
    }
    function saveSpeakerPref(on) {
        try { localStorage.setItem("term-speaker", on ? "on" : "off"); }
        catch(e) {}
    }
    function setSpeakerLabel() {
        if (!speakerBtn) return;
        speakerBtn.textContent = speakerOn ? "speaker on" : "speaker off";
        speakerBtn.setAttribute("aria-pressed", speakerOn ? "true" : "false");
        speakerBtn.classList.toggle("term-speaker-on", speakerOn);
    }
    function ttsAccumulate(chunk) {
        if (!speakerOn) return;
        ttsBuffer += chunk;
    }
    function scheduleTtsFlush() {
        if (!speakerOn) return;
        if (ttsFlushTimer) clearTimeout(ttsFlushTimer);
        ttsFlushTimer = setTimeout(flushTtsNow, 1500);
    }
    async function flushTtsNow() {
        if (ttsFlushTimer) { clearTimeout(ttsFlushTimer); ttsFlushTimer = null; }
        const text = ttsBuffer.trim();
        ttsBuffer = "";
        if (!speakerOn || !text) return;
        const voiceId = currentMindName || "default";
        try {
            const resp = await fetch("/api/terminal/tts", {
                method: "POST",
                credentials: "same-origin",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({text: text, voice_id: voiceId}),
            });
            if (!resp.ok) return;
            const blob = await resp.blob();
            ttsQueue.push(URL.createObjectURL(blob));
            playNextTtsClip();
        } catch(err) { /* swallow */ }
    }
    function playNextTtsClip() {
        if (ttsPlaying) return;
        const url = ttsQueue.shift();
        if (!url) return;
        ttsPlaying = true;
        audioEl.src = url;
        audioEl.play().catch(function() { ttsPlaying = false; URL.revokeObjectURL(url); });
        audioEl.onended = function() {
            URL.revokeObjectURL(url);
            ttsPlaying = false;
            playNextTtsClip();
        };
    }
    if (speakerBtn) {
        speakerOn = loadSpeakerPref();
        setSpeakerLabel();
        speakerBtn.addEventListener("click", function() {
            speakerOn = !speakerOn;
            saveSpeakerPref(speakerOn);
            setSpeakerLabel();
            if (!speakerOn) {
                ttsBuffer = "";
                if (ttsFlushTimer) { clearTimeout(ttsFlushTimer); ttsFlushTimer = null; }
                ttsQueue.length = 0;
                try { audioEl.pause(); audioEl.src = ""; } catch(e) {}
                ttsPlaying = false;
            }
        });
    }

    // --- Voice input (Web Speech API) ---
    const micBtn = document.getElementById("term-mic-btn");
    const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let micActive = false;
    let micFinalText = "";

    function setMicLabel(state) {
        if (!micBtn) return;
        if (state === "on") {
            micBtn.textContent = "listening…";
            micBtn.classList.add("term-mic-on");
        } else if (state === "error") {
            micBtn.textContent = "mic error";
            micBtn.classList.remove("term-mic-on");
        } else {
            micBtn.textContent = "mic";
            micBtn.classList.remove("term-mic-on");
        }
    }

    if (SpeechRecognitionCtor && micBtn) {
        micBtn.hidden = false;
        recognition = new SpeechRecognitionCtor();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = (navigator.language || "en-US");

        recognition.onresult = function(event) {
            let finalText = "";
            let interim = "";
            for (let i = 0; i < event.results.length; i++) {
                const res = event.results[i];
                const transcript = res[0] && res[0].transcript ? res[0].transcript : "";
                if (res.isFinal) {
                    finalText += (finalText ? " " : "") + transcript.trim();
                } else {
                    interim += transcript;
                }
            }
            const preserved = micFinalText ? micFinalText + " " : "";
            input.value = (preserved + finalText + " " + interim).replace(/\s+/g, " ").trim();
            autoGrowInput();
        };

        recognition.onerror = function() {
            setMicLabel("error");
            micActive = false;
        };

        recognition.onend = function() {
            if (micActive) {
                micFinalText = input.value.trim();
                try { recognition.start(); } catch(e) { micActive = false; setMicLabel("off"); }
            } else {
                setMicLabel("off");
            }
        };

        micBtn.addEventListener("click", function() {
            if (!micActive) {
                micFinalText = input.value.trim();
                try {
                    recognition.start();
                    micActive = true;
                    setMicLabel("on");
                    input.focus();
                } catch(e) {
                    setMicLabel("error");
                }
            } else {
                micActive = false;
                try { recognition.stop(); } catch(e) {}
                setMicLabel("off");
            }
        });

        form.addEventListener("submit", function() {
            if (micActive) {
                micActive = false;
                try { recognition.stop(); } catch(e) {}
                setMicLabel("off");
            }
            micFinalText = "";
        });
    }

    // Boot: prefer the session we stored last time (if still in the list), else first load entry.
    const loadOptions = Array.from(mindSelect.options).filter(o => o.dataset.action === "load");
    const remembered = recalledSession();
    const rememberedOpt = remembered
        ? loadOptions.find(o => o.dataset.sessionId === remembered)
        : null;
    if (rememberedOpt) {
        mindSelect.value = rememberedOpt.value;
        attachSessionFromOption(rememberedOpt);
    } else if (loadOptions.length > 0) {
        mindSelect.value = loadOptions[0].value;
        attachSessionFromOption(loadOptions[0]);
    } else if (mindSelect.options.length > 0) {
        sessionInfo.textContent = "no active sessions — pick a mind and click new session";
    }
})();
</script>
{% endblock %}
