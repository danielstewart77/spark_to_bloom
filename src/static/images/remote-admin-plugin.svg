<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#0a0e19"/>

  <!-- Terminal frame -->
  <rect x="6" y="20" width="62" height="52" rx="5" fill="#162030" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="6" y="20" width="62" height="12" rx="5" fill="#1e3a5a"/>
  <rect x="6" y="26" width="62" height="6" fill="#1e3a5a"/>
  <!-- Window control dots -->
  <circle cx="14" cy="26" r="2.5" fill="#38bdf8" opacity="0.6"/>
  <circle cx="21" cy="26" r="2.5" fill="#38bdf8" opacity="0.4"/>
  <circle cx="28" cy="26" r="2.5" fill="#38bdf8" opacity="0.25"/>

  <!-- Terminal text lines -->
  <text x="10" y="44" fill="#38bdf8" font-family="monospace" font-size="8.5" opacity="0.9">$ ssh pi@host</text>
  <text x="10" y="55" fill="#38bdf8" font-family="monospace" font-size="8" opacity="0.65">connected ✓</text>
  <text x="10" y="66" fill="#38bdf8" font-family="monospace" font-size="9" opacity="0.9">▌</text>

  <!-- Dashed connection lines to remote nodes -->
  <line x1="68" y1="32" x2="80" y2="24" stroke="#38bdf8" stroke-width="1" stroke-dasharray="3,2" opacity="0.8"/>
  <line x1="68" y1="46" x2="83" y2="46" stroke="#38bdf8" stroke-width="1" stroke-dasharray="3,2" opacity="0.8"/>
  <line x1="68" y1="60" x2="80" y2="68" stroke="#38bdf8" stroke-width="1" stroke-dasharray="3,2" opacity="0.8"/>

  <!-- Remote server nodes -->
  <rect x="80" y="19" width="13" height="10" rx="2" fill="#162030" stroke="#38bdf8" stroke-width="1.2"/>
  <line x1="82" y1="24" x2="91" y2="24" stroke="#38bdf8" stroke-width="0.8" opacity="0.6"/>

  <rect x="83" y="41" width="13" height="10" rx="2" fill="#162030" stroke="#38bdf8" stroke-width="1.2"/>
  <line x1="85" y1="46" x2="94" y2="46" stroke="#38bdf8" stroke-width="0.8" opacity="0.6"/>

  <rect x="80" y="63" width="13" height="10" rx="2" fill="#162030" stroke="#38bdf8" stroke-width="1.2"/>
  <line x1="82" y1="68" x2="91" y2="68" stroke="#38bdf8" stroke-width="0.8" opacity="0.6"/>
</svg>
