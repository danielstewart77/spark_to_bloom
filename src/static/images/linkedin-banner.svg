<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 80">
  <defs>
    <filter id="lglow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Animated dash offset for the connection line -->
    <style>
      .conn-line { stroke-dasharray: 6 4; animation: dash 2s linear infinite; }
      @keyframes dash { to { stroke-dashoffset: -20; } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="700" height="80" rx="8" fill="rgba(10,14,25,0.90)"/>

  <!-- Left node — Daniel -->
  <circle cx="60" cy="40" r="22" fill="#162030" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- Subtle person silhouette -->
  <circle cx="60" cy="33" r="7" fill="#38bdf8" opacity="0.85"/>
  <path d="M45,55 Q45,44 60,44 Q75,44 75,55" fill="#38bdf8" opacity="0.85"/>

  <!-- Animated connection line -->
  <line x1="83" y1="40" x2="247" y2="40"
        stroke="#38bdf8" stroke-width="1.2" opacity="0.6"
        class="conn-line" stroke-dashoffset="0"/>

  <!-- Pulse dots along the line -->
  <circle cx="130" cy="40" r="2.5" fill="#38bdf8" opacity="0.5"/>
  <circle cx="165" cy="40" r="2.5" fill="#38bdf8" opacity="0.5"/>
  <circle cx="200" cy="40" r="2.5" fill="#38bdf8" opacity="0.5"/>

  <!-- LinkedIn "in" badge -->
  <rect x="250" y="14" width="52" height="52" rx="9" fill="#0a66c2"/>
  <text x="276" y="50" text-anchor="middle"
        fill="white" font-family="Arial, sans-serif"
        font-size="28" font-weight="bold" letter-spacing="-1">in</text>

  <!-- Text block -->
  <text x="320" y="34" fill="#38bdf8"
        font-family="'Fira Code', monospace" font-size="15"
        filter="url(#lglow)">connect with me</text>
  <text x="320" y="54" fill="#dce8f0"
        font-family="'Fira Code', monospace" font-size="11"
        opacity="0.65">linkedin / daniel stewart</text>

  <!-- Right arrow -->
  <text x="640" y="46" fill="#38bdf8"
        font-family="'Fira Code', monospace" font-size="22"
        opacity="0.75" filter="url(#lglow)">→</text>
</svg>
