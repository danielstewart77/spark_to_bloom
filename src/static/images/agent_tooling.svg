<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#0a0e19"/>

  <!-- Network lines from gear to nodes -->
  <line x1="50" y1="50" x2="20" y2="20" stroke="#38bdf8" stroke-width="1.2" opacity="0.45"/>
  <line x1="50" y1="50" x2="80" y2="20" stroke="#38bdf8" stroke-width="1.2" opacity="0.45"/>
  <line x1="50" y1="50" x2="16" y2="62" stroke="#38bdf8" stroke-width="1.2" opacity="0.45"/>
  <line x1="50" y1="50" x2="84" y2="62" stroke="#38bdf8" stroke-width="1.2" opacity="0.45"/>
  <line x1="50" y1="50" x2="50" y2="84" stroke="#38bdf8" stroke-width="1.2" opacity="0.45"/>

  <!-- Outer agent nodes -->
  <circle cx="20" cy="20" r="7" fill="#162030" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="80" cy="20" r="7" fill="#162030" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="16" cy="62" r="7" fill="#162030" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="84" cy="62" r="7" fill="#162030" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="50" cy="84" r="7" fill="#162030" stroke="#38bdf8" stroke-width="1.5"/>

  <!-- Central gear body -->
  <circle cx="50" cy="50" r="15" fill="#162030" stroke="#38bdf8" stroke-width="1.5"/>

  <!-- Gear teeth (8 rotated rects) -->
  <g transform="translate(50,50)">
    <rect x="-2.5" y="-20" width="5" height="7" rx="1" fill="#38bdf8" transform="rotate(0)"/>
    <rect x="-2.5" y="-20" width="5" height="7" rx="1" fill="#38bdf8" transform="rotate(45)"/>
    <rect x="-2.5" y="-20" width="5" height="7" rx="1" fill="#38bdf8" transform="rotate(90)"/>
    <rect x="-2.5" y="-20" width="5" height="7" rx="1" fill="#38bdf8" transform="rotate(135)"/>
    <rect x="-2.5" y="-20" width="5" height="7" rx="1" fill="#38bdf8" transform="rotate(180)"/>
    <rect x="-2.5" y="-20" width="5" height="7" rx="1" fill="#38bdf8" transform="rotate(225)"/>
    <rect x="-2.5" y="-20" width="5" height="7" rx="1" fill="#38bdf8" transform="rotate(270)"/>
    <rect x="-2.5" y="-20" width="5" height="7" rx="1" fill="#38bdf8" transform="rotate(315)"/>
    <!-- Inner hollow -->
    <circle r="6" fill="#0a0e19"/>
    <circle r="3.5" fill="none" stroke="#38bdf8" stroke-width="1.2"/>
  </g>
</svg>
