services:
  frontend:
    build: .
    container_name: spark-to-bloom-app
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
    ports:
      - "5000:5000"
    volumes:
      - /home/daniel/Storage/Dev/spark_to_bloom/src:/app
      - hivemind-data:/data:ro
    networks:
      - traefik-global

volumes:
  hivemind-data:
    external: true
    name: hive_mind_sessions-db

networks:
  traefik-global:
    external: true
    name: traefik-global
