services:
  frontend:
    build: .
    container_name: spark-to-bloom-app
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - GRAPH_API_URL=http://server:8420
    ports:
      - "5000:5000"
    volumes:
      - /home/daniel/Storage/Dev/spark_to_bloom/src:/app
    networks:
      - hivemind

networks:
  hivemind:
    external: true
    name: hivemind
