services:
  frontend:
    build: .
    container_name: spark-to-bloom-app
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - GATEWAY_API_URL=http://hive-comms:8424
      - LUCENT_API_URL=http://hive-lucent:8424
      - COMMS_BEARER_TOKEN=${COMMS_BEARER_TOKEN}
      - LUCENT_BEARER_TOKEN=${LUCENT_BEARER_TOKEN}
      - HIVE_INIT_HOST=${HIVE_INIT_HOST:-gethivemind.sparktobloom.com}
      - HIVE_INIT_REPO_DIR=/srv/hive-init
      - STB_SECRET_KEY=${STB_SECRET_KEY:-change-this-in-production}
      - STB_DB_PATH=/data/stb.db
      - VOICE_API_URL=${VOICE_API_URL:-http://hive-mind-voice:8422}
      - LUCENT_DB_PATH=${LUCENT_DB_PATH:-/lucent/lucent.db}
      - EVENT_TRIAGE_URL=${EVENT_TRIAGE_URL:-http://event-triage:8430}
      - EVENT_TRIAGE_BEARER_TOKEN=${EVENT_TRIAGE_BEARER_TOKEN}
    ports:
      - "5000:5000"
    volumes:
      - ./src:/app
      - ./data:/data
      - ./scripts:/scripts
      - ${HIVE_INIT_HOST_PATH:-/home/daniel/Storage/Dev/hive-init}:/srv/hive-init:ro
      - ${LUCENT_DB_HOST_DIR:-/home/daniel/Storage/Dev/hive_nervous_system/data}:/lucent:ro
    networks:
      - hivemind

networks:
  hivemind:
    external: true
    name: hivemind
